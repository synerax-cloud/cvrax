# Deploy CVRAX to Google Cloud Platform
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID - Your GCP project ID
#   WIF_PROVIDER - Workload Identity Provider resource name
#   WIF_SERVICE_ACCOUNT - Service account email for Workload Identity
#   NEXTAUTH_SECRET - Random secret for NextAuth (generate with: openssl rand -base64 32)
#   GOOGLE_CLIENT_ID - Google OAuth Client ID
#   GOOGLE_CLIENT_SECRET - Google OAuth Client Secret
#   DOMAIN_NAME - (Optional) Custom domain name
#
# Setup: Run ./scripts/setup-workload-identity.sh to generate all required values
# Documentation: See QUICKSTART.md for detailed setup instructions
#
# Note: This uses Workload Identity Federation (keyless authentication)
# instead of service account keys for better security.

name: Deploy to GCP Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: cvrax
  REGION: us-central1

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      artifact_registry_url: ${{ steps.outputs.outputs.artifact_registry_url }}
      service_name: ${{ steps.outputs.outputs.service_name }}
      region: ${{ steps.outputs.outputs.region }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Validate Required Secrets
        run: |
          echo "🔍 Validating required secrets..."
          
          missing_secrets=()
          
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            missing_secrets+=("GCP_PROJECT_ID")
          fi
          
          if [ -z "${{ secrets.WIF_PROVIDER }}" ]; then
            missing_secrets+=("WIF_PROVIDER")
          fi
          
          if [ -z "${{ secrets.WIF_SERVICE_ACCOUNT }}" ]; then
            missing_secrets+=("WIF_SERVICE_ACCOUNT")
          fi
          
          if [ -z "${{ secrets.NEXTAUTH_SECRET }}" ]; then
            missing_secrets+=("NEXTAUTH_SECRET")
          fi
          
          if [ -z "${{ secrets.GOOGLE_CLIENT_ID }}" ]; then
            missing_secrets+=("GOOGLE_CLIENT_ID")
          fi
          
          if [ -z "${{ secrets.GOOGLE_CLIENT_SECRET }}" ]; then
            missing_secrets+=("GOOGLE_CLIENT_SECRET")
          fi
          
          if [ ${#missing_secrets[@]} -ne 0 ]; then
            echo "::error::❌ Missing required GitHub secrets: ${missing_secrets[*]}"
            echo ""
            echo "📋 To fix this:"
            echo "1. Run: ./scripts/setup-workload-identity.sh"
            echo "2. Add secrets to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "3. See QUICKSTART.md for detailed instructions"
            echo ""
            exit 1
          fi
          
          echo "✅ All required secrets are present"
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false
      
      - name: Create Terraform variables
        working-directory: terraform
        run: |
          cat > terraform.tfvars <<EOF
          project_id           = "${{ secrets.GCP_PROJECT_ID }}"
          region               = "${{ env.REGION }}"
          environment          = "production"
          service_name         = "${{ env.SERVICE_NAME }}"
          nextauth_secret      = "${{ secrets.NEXTAUTH_SECRET }}"
          google_client_id     = "${{ secrets.GOOGLE_CLIENT_ID }}"
          google_client_secret = "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          domain_name          = "${{ secrets.DOMAIN_NAME }}"
          EOF
      
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      
      - name: Clean up failed connector (if exists)
        working-directory: terraform
        run: |
          echo "Checking for failed VPC connector..."
          if gcloud compute networks vpc-access connectors describe cvrax-vpc-connector \
            --region=us-central1 --project=${{ secrets.GCP_PROJECT_ID }} 2>/dev/null; then
            echo "Connector exists, attempting to delete..."
            gcloud compute networks vpc-access connectors delete cvrax-vpc-connector \
              --region=us-central1 \
              --project=${{ secrets.GCP_PROJECT_ID }} \
              --quiet || echo "Delete failed, continuing anyway"
            echo "Waiting 60 seconds for deletion..."
            sleep 60
          fi
      
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan
      
      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
      
      - name: Get Terraform Outputs
        id: outputs
        working-directory: terraform
        run: |
          echo "artifact_registry_url=$(terraform output -raw artifact_registry_url)" >> $GITHUB_OUTPUT
          echo "service_name=$(terraform output -raw service_name)" >> $GITHUB_OUTPUT
          echo "region=$(terraform output -raw region)" >> $GITHUB_OUTPUT
  
  deploy:
    name: Build and Deploy Application
    runs-on: ubuntu-latest
    needs: terraform
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Debug Terraform Outputs
        run: |
          echo "artifact_registry_url: ${{ needs.terraform.outputs.artifact_registry_url }}"
          echo "service_name: ${{ needs.terraform.outputs.service_name }}"
          echo "region: ${{ needs.terraform.outputs.region }}"
          
          if [ -z "${{ needs.terraform.outputs.artifact_registry_url }}" ]; then
            echo "::error::artifact_registry_url is empty!"
            exit 1
          fi
          
          if [ -z "${{ needs.terraform.outputs.service_name }}" ]; then
            echo "::error::service_name is empty!"
            exit 1
          fi
          
          if [ -z "${{ needs.terraform.outputs.region }}" ]; then
            echo "::error::region is empty!"
            exit 1
          fi
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ needs.terraform.outputs.artifact_registry_url }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ needs.terraform.outputs.artifact_registry_url }}/${{ env.SERVICE_NAME }}:latest \
            .
      
      - name: Push Docker image
        run: |
          docker push ${{ needs.terraform.outputs.artifact_registry_url }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ needs.terraform.outputs.artifact_registry_url }}/${{ env.SERVICE_NAME }}:latest
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ needs.terraform.outputs.service_name }} \
            --image ${{ needs.terraform.outputs.artifact_registry_url }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ needs.terraform.outputs.region }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --vpc-connector cvrax-vpc-connector \
            --vpc-egress private-ranges-only \
            --set-env-vars NODE_ENV=production \
            --set-secrets DATABASE_URL=DATABASE_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300
      
      - name: Run Database Migrations
        run: |
          # Get Cloud Run service URL
          SERVICE_URL=$(gcloud run services describe ${{ needs.terraform.outputs.service_name }} \
            --region ${{ needs.terraform.outputs.region }} \
            --format 'value(status.url)')
          
          echo "✅ Deployment successful!"
          echo "🌐 Service URL: $SERVICE_URL"
          echo "📊 Database migrations will run automatically on container startup"
      
      - name: Deployment Summary
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ needs.terraform.outputs.service_name }} \
            --region ${{ needs.terraform.outputs.region }} \
            --format 'value(status.url)')
            
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status**: Successful" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **URL**: $SERVICE_URL" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Image**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "🏷️ **Tag**: \`latest\`" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Deployed**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
